server.port=8082

# ==========================================
# H2 Console Configuration
# ==========================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# JDBC Connection (In-Memory Database)
# ==========================================
spring.datasource.url=jdbc:h2:mem:bankdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==========================================
# Database Initialization Strategy
# ==========================================
# Tells Spring Boot to always initialize the database using your scripts
spring.sql.init.mode=always

# Path to your schema file (creates the tables)
spring.sql.init.schema-locations=classpath:schema.sql

# OPTIONAL: Uncomment the line below ONLY if you have created a physical data.sql file
# spring.sql.init.data-locations=classpath:data.sql